name: Auto Scan Moneyline Picks

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  auto-scan-moneyline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Warm Railway app
        run: |
          echo "Waking Railway app..."
          curl --retry 5 \
            --retry-delay 10 \
            --max-time 120 \
            -sS \
            "https://smartbet-scanner-production.up.railway.app/" || true

          echo "Waiting for Railway warmup..."
          sleep 25

      - name: Run SmartBet moneyline scan
        run: |
          set -e

          echo "Calling SmartBet moneyline /scan-auto endpoint..."

          RESPONSE=$(curl --retry 5 \
            --retry-delay 15 \
            --max-time 300 \
            -sS \
            -w "\nHTTP_STATUS:%{http_code}" \
            "https://smartbet-scanner-production.up.railway.app/scan-auto")

          echo "$RESPONSE"

          HTTP_STATUS=$(echo "$RESPONSE" | awk -F: '/HTTP_STATUS/ {print $2}')

          if [ -z "$HTTP_STATUS" ]; then
            echo "No HTTP status returned from Railway."
            exit 1
          fi

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Auto scan failed with HTTP status $HTTP_STATUS"
            exit 1
          fi

          echo "Moneyline auto scan completed successfully."
